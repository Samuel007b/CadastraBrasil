<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastra Brasil</title>
  <link rel="icon" href="assets/logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-content">
      <img class="br-icon" src="assets/logo.webp" alt="ícone-br">
      <h1><span class="text-cadastra">Cadastra</span><span class="text-brasil">Brasil</span></h1>
    </div>
  </header>
  <main class="page">

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <section class="toolbar">
      <div class="search-group">
        <div class="search-input-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="text" id="search-input" placeholder="Buscar por nome ou CPF..." autocomplete="off" />
        </div>
      </div>
      <button id="btn-novo" class="btn btn-primary" type="button">
        <span aria-hidden="true">+</span> Novo cidadão
      </button>
    </section>

    <section class="table-card">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th class="col-acao"><span class="sr-only">Ações</span></th>
          </tr>
        </thead>
        <tbody id="tabela-corpo">
        </tbody>
      </table>

      <div id="estado-vazio" class="estado-vazio" hidden>
        <p id="estado-vazio-texto">Nenhum cidadão cadastrado ainda.</p>
      </div>

      <div id="estado-carregando" class="estado-vazio">
        <p>Carregando cidadãos…</p>
      </div>
    </section>

  </main>

  <div id="modal-visualizar" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-visualizar-titulo">
      <button class="modal-close" type="button" data-close-modal aria-label="Fechar">&times;</button>
      <h2 id="modal-visualizar-titulo">Dados do cidadão</h2>

      <dl class="detalhe-lista">
        <div class="detalhe-item">
          <dt>ID</dt>
          <dd id="detalhe-id"></dd>
        </div>
        <div class="detalhe-item">
          <dt>Nome completo</dt>
          <dd id="detalhe-nome"></dd>
        </div>
        <div class="detalhe-item">
          <dt>CPF</dt>
          <dd id="detalhe-cpf"></dd>
        </div>
      </dl>

      <div class="modal-actions">
        <button id="btn-excluir" class="btn btn-danger" type="button">Excluir</button>
        <button id="btn-editar" class="btn btn-secondary" type="button">Editar</button>
      </div>
    </div>
  </div>

  <div id="modal-formulario" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-formulario-titulo">
      <button class="modal-close" type="button" data-close-modal aria-label="Fechar">&times;</button>
      <h2 id="modal-formulario-titulo">Novo cidadão</h2>

      <form id="form-cidadao" novalidate>
        <input type="hidden" id="form-id" />

        <label for="form-nome">Nome completo</label>
        <input type="text" id="form-nome" name="nome" placeholder="Fulano de Tal" autocomplete="off" required />
        <p class="campo-erro" id="erro-nome" hidden></p>

        <label for="form-cpf">CPF</label>
        <input type="text" id="form-cpf" name="cpf" placeholder="000.000.000-00" inputmode="numeric" maxlength="14" required />
        <p class="campo-erro" id="erro-cpf" hidden></p>

        <p class="form-erro-geral" id="erro-geral" hidden></p>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" data-close-modal>Cancelar</button>
          <button type="submit" class="btn btn-primary" id="btn-salvar">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-confirmar" class="modal-overlay" hidden>
    <div class="modal modal-small" role="dialog" aria-modal="true" aria-labelledby="modal-confirmar-titulo">
      <button class="modal-close" type="button" data-close-modal aria-label="Fechar">&times;</button>
      <h2 id="modal-confirmar-titulo">Excluir cidadão</h2>
      <p id="modal-confirmar-texto">Tem certeza de que deseja excluir este cadastro? Essa ação não pode ser desfeita.</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" data-close-modal>Cancelar</button>
        <button type="button" class="btn btn-danger" id="btn-confirmar-exclusao">Sim, excluir</button>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
