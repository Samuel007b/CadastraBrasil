info:
  name: Pesquisar cidadão inexistente
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/api/pessoas/pesquisa?termo=999"
  params:
    - name: termo
      value: "999"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve retornar status 404", function() {
          expect(res.getStatus()).to.equal(404);
        });

        test("deve retornar mensagem de erro", function() {
          expect(res.getBody().erro).to.equal("Cidadão não encontrado.");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
