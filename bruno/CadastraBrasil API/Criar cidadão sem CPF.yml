info:
  name: Criar cidadão sem CPF
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/api/pessoas"
  body:
    type: json
    data: |-
      {
        "nome": "João Ferreira"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve retornar status 400", function() {
          expect(res.getStatus()).to.equal(400);
        });

        test("deve retornar mensagem de erro", function() {
          expect(res.getBody().erro).to.equal("Nome e CPF são obrigatórios.");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
