info:
  name: Listar cidadãos
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/pessoas"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve retornar status 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("deve retornar um array", function() {
          expect(res.getBody().pessoas).to.be.an('array');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
