info:
  name: Criar cidadão duplicado
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/api/pessoas"
  body:
    type: json
    data: |-
      {
        "nome": "João Ferreira",
        "cpf": "987.654.321-00"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve retornar status 409", function() {
          expect(res.getStatus()).to.equal(409);
        });

        test("deve retornar mensagem de erro", function() {
          expect(res.getBody().erro).to.equal("Já existe um cidadão cadastrado com este CPF.");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
