info:
  name: Alterar cidadão duplicado
  type: http
  seq: 13

http:
  method: PUT
  url: "{{baseUrl}}/api/pessoas/1"
  body:
    type: json
    data: |-
      {
        "nome": "João Ferreira",
        "cpf": "388.023.890-12"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve retornar status 409", function() {
          expect(res.getStatus()).to.equal(409);
        });

        test("deve retornar mensagem de erro", function() {
          expect(res.getBody().erro).to.equal("Já existe um cidadão cadastrado com este CPF.");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
